<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>GAME NESR3</title>

<style>
body{
margin:0;
font-family:Arial;
background:linear-gradient(rgba(0,0,0,0.75),rgba(0,0,0,0.75)),
url("images/bg.jpg") no-repeat center center fixed;
background-size:cover;
color:white;
text-align:center;
}

.hidden{display:none;}

.center{
position:absolute;
top:50%;
left:50%;
transform:translate(-50%,-50%);
background:rgba(0,0,0,0.75);
padding:25px;
border-radius:15px;
width:340px;
}

h1{font-size:42px;margin:5px;}
h2{margin:5px;}

input,select{
width:90%;
padding:10px;
margin:6px;
border-radius:8px;
border:none;
}

button{
padding:10px 16px;
margin:6px;
border:none;
border-radius:8px;
cursor:pointer;
background:#22c55e;
color:white;
}

.top-right{
position:absolute;
top:10px;
right:10px;
}

.wallet-container{
display:flex;
justify-content:center;
gap:20px;
flex-wrap:wrap;
margin-top:20px;
}

.box{
background:rgba(0,0,0,0.7);
padding:15px;
border-radius:12px;
width:320px;
}

</style>
</head>

<body>

<!-- WALLET BUTTON -->
<div class="top-right">
<button onclick="openWallet()">💼 اتصل بالمحفظة</button>
</div>

<!-- LOGIN -->
<div id="login" class="center">
<h1>GAME NESR3</h1>
<h3>Welcome to Digital Future Games</h3>

<h2>Login</h2>
<input id="email" placeholder="Email">
<input id="pass" type="password" placeholder="Password">
<button onclick="login()">Login</button>
</div>

<!-- DASHBOARD (SELECT GAME) -->
<div id="dashboard" class="hidden">

<h1>GAME NESR3</h1>
<h3>Welcome to Digital Future Games</h3>
<h2>Choose Your Favorite Game</h2>

<!-- 🔥 5 GAMES (بدون حذف) -->
<button onclick="startGame('NESR3')">NESR3 Game</button>
<button onclick="startGame('Car')">Car Game</button>
<button onclick="startGame('Sea')">Sea Game</button>
<button onclick="startGame('Forest')">Forest Game</button>
<button onclick="startGame('City')">City Game</button>
<button onclick="startGame('Village')">Village Game</button>

<br><br>
<button onclick="openWallet()">💼 Open Wallet</button>

</div>

<!-- GAME -->
<div id="game" class="hidden">
<h2 id="gameTitle">Game</h2>
<button onclick="earn()">Earn</button>
<button onclick="crash()">Crash</button>
<br><br>
<button onclick="back()">⬅ Back</button>
</div>

<!-- WALLET -->
<div id="wallet" class="hidden">

<h1>💼 Game Wallet</h1>

<div class="wallet-container">

<div class="box">
<h2>💰 اشحن حسابك</h2>

<button onclick="showCrypto()">Crypto</button>
<button onclick="bank()">Bank Card</button>
<button onclick="apple()">Apple Store</button>

<div id="cryptoBox" class="hidden">

<h3>Coin</h3>
<select id="coinSelect">
<option>USDT</option>
<option>BTC</option>
<option>BNB</option>
<option>SOL</option>
<option>USDC</option>
<option>USDG</option>
<option>DAF1</option>
<option>NES3</option>
<option>DAYF</option>
<option>NOR4</option>
<option>DAF7</option>
<option>SMR99</option>
</select>

<h3>Network</h3>
<select id="network">
<option>BNB</option>
<option>Ethereum</option>
<option>Solana</option>
<option>TRON</option>
</select>

<input id="amount" placeholder="Amount">
<button onclick="deposit()">Deposit</button>

</div>
</div>

<div class="box">
<h2>📊 رصيدي</h2>
<div id="balances"></div>
</div>

</div>

<br>

<h3>🔁 تحويل بين العملات</h3>

<select id="from"></select>
<select id="to"></select>
<input id="tamount" placeholder="Amount">
<button onclick="transfer()">Transfer</button>

<br><br>
<button onclick="back()">⬅ Back</button>

</div>

<script>

let coins = {
USDT:0,BTC:0,BNB:0,SOL:0,USDC:0,USDG:0,
DAF1:0,NES3:0,DAYF:0,NOR4:0,DAF7:0,SMR99:0
};

let history = [];

// LOGIN
function login(){
let e=document.getElementById('email').value;
let p=document.getElementById('pass').value;

if(e&&p){
hideAll();
document.getElementById('dashboard').classList.remove('hidden');
update();
fill();
}
}

// NAV
function hideAll(){
document.querySelectorAll('body > div').forEach(d=>d.classList.add('hidden'));
}

// GAME SELECT
function startGame(name){
hideAll();
document.getElementById('game').classList.remove('hidden');
document.getElementById('gameTitle').innerText=name+" Game";
}

// GAME EARN/LOSS
function earn(){
coins.NES3+=10;
coins.DAF1+=5;
update();
}

function crash(){
coins.NES3-=5;
coins.DAF1-=3;
update();
}

// WALLET
function openWallet(){
hideAll();
document.getElementById('wallet').classList.remove('hidden');
update();
fill();
}

function showCrypto(){
document.getElementById('cryptoBox').classList.remove('hidden');
}

function deposit(){
let c=document.getElementById('coinSelect').value;
let a=parseFloat(document.getElementById('amount').value);
let n=document.getElementById('network').value;

if(a>0){
coins[c]+=a;
history.push("Deposit "+a+" "+c+" on "+n);
update();
alert("Success");
}
}

function transfer(){
let f=document.getElementById('from').value;
let t=document.getElementById('to').value;
let a=parseFloat(document.getElementById('tamount').value);

if(a>0 && coins[f]>=a){
coins[f]-=a;
coins[t]+=a;
history.push("Transfer "+a+" from "+f+" to "+t);
update();
}
}

function update(){
let html="";
for(let c in coins){
html+=c+" : "+coins[c]+"<br>";
}
document.getElementById('balances').innerHTML=html;
}

function fill(){
let f=document.getElementById('from');
let t=document.getElementById('to');

f.innerHTML="";
t.innerHTML="";

for(let c in coins){
f.innerHTML+="<option>"+c+"</option>";
t.innerHTML+="<option>"+c+"</option>";
}
}

function bank(){alert("Coming Soon");}
function apple(){alert("Coming Soon");}

// BACK
function back(){
hideAll();
document.getElementById('dashboard').classList.remove('hidden');
update();
}

</script>

</body>
</html>
