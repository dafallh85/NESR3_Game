<!DOCTYPE html>
<html lang="ar">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>NESR3 GAME</title>

<style>
body { margin:0; background:#111; color:#fff; font-family:Arial; overflow:hidden;}
#game { width:100vw; height:80vh; background:#222; display:flex; justify-content:center; align-items:center;}
#ui { height:20vh; display:flex; justify-content:space-around; align-items:center;}
button { padding:10px; background:#ff9800; border:none; color:#fff; border-radius:5px;}
</style>

</head>
<body>

<div id="game">
  <canvas id="canvas" width="800" height="500"></canvas>
</div>

<div id="ui">
  <button onclick="connectWallet()">ربط المحفظة</button>
  <button onclick="depositTokens()">إيداع</button>
  <button onclick="buyTokens()">شراء</button>
  <button onclick="withdrawFromGame()">سحب</button>
  <span id="status">غير متصل</span>
</div>

<!-- مهم جدا -->
<script src="https://cdn.jsdelivr.net/npm/web3@1.10.0/dist/web3.min.js"></script>
<script src="web3.js"></script>

<script>
// ===== لعبة بسيطة =====
let canvas = document.getElementById("canvas");
let ctx = canvas.getContext("2d");

let carX = 350;
let gameWallet = { NES3:0, DAF1:0 };

function draw() {
  ctx.clearRect(0,0,800,500);

  // السيارة
  ctx.fillStyle="lime";
  ctx.fillRect(carX,400,80,50);

  // عرض العملات
  ctx.fillStyle="white";
  ctx.fillText("NES3: "+gameWallet.NES3,10,20);
  ctx.fillText("DAF1: "+gameWallet.DAF1,10,40);

  requestAnimationFrame(draw);
}

// تحكم
document.addEventListener("keydown",(e)=>{
  if(e.key==="ArrowLeft") carX-=20;
  if(e.key==="ArrowRight") carX+=20;

  // كسب عملة للتجربة
  if(e.key==="ArrowUp"){
    gameWallet.NES3+=1;
    gameWallet.DAF1+=1;
  }
});

draw();
</script>

</body>
</html>
