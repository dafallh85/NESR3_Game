<!DOCTYPE html>
<html lang="ar">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>لعبة نسر 3 - سيارات</title>

<!-- ستايل بسيط للعبة -->
<style>
  body { margin:0; padding:0; font-family: Arial, sans-serif; background:#111; color:#fff; overflow:hidden;}
  #gameContainer { width:100vw; height:80vh; background:#222; display:flex; justify-content:center; align-items:center;}
  #ui { width:100%; height:20vh; display:flex; justify-content:space-around; align-items:center; background:#111; padding:10px;}
  button { padding:10px 20px; font-size:16px; cursor:pointer; border:none; border-radius:5px; background:#ff9500; color:#fff;}
  button:hover { background:#ffa733;}
  #status { font-size:14px; }
</style>
</head>
<body>

<div id="gameContainer">
  <canvas id="gameCanvas" width="800" height="600"></canvas>
</div>

<div id="ui">
  <button id="connectWalletBtn">ربط المحفظة</button>
  <button id="depositBtn">إيداع NES3 / DAF1</button>
  <button id="buyTokenBtn">شراء NES3 / DAF1</button>
  <button id="withdrawBtn">سحب العملات إلى محفظتك</button>
  <div id="status">الحالة: غير متصل</div>
</div>

<!-- Web3.js -->
<script src="https://cdn.jsdelivr.net/npm/web3@1.10.0/dist/web3.min.js"></script>

<!-- كود اللعبة -->
<script src="game.js"></script>

</body>
</html>
