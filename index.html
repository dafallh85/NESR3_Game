<!DOCTYPE html>
<html>
<head>
<meta charset="UTF-8">
<title>GAME NESR3</title>

<style>
body{
  margin:0;
  font-family:Arial;
  background:black;
  color:white;
  text-align:center;
}

header{
  display:flex;
  justify-content:space-between;
  padding:10px;
  background:#111;
}

.wallet-btn{
  background:gold;
  color:black;
  padding:8px 15px;
  border-radius:10px;
  cursor:pointer;
}

.page{display:none;}
.active{display:block;}

#game{
  width:100%;
  max-width:400px;
  height:600px;
  margin:auto;
  background:#222;
  position:relative;
  overflow:hidden;
}

#car{
  position:absolute;
  bottom:20px;
  left:170px;
  width:60px;
  height:80px;
  background:url('assets/car.png') no-repeat center;
  background-size:contain;
}

.enemy{
  position:absolute;
  width:60px;
  height:80px;
  background:url('assets/enemy.png') no-repeat center;
  background-size:contain;
}

.coin{
  position:absolute;
  width:30px;
  height:30px;
  background:url('assets/coin.png') no-repeat center;
  background-size:contain;
}

.coin-box{
  background:#222;
  margin:10px;
  padding:10px;
  border-radius:10px;
}

.main{background:gold;color:black;}
</style>
</head>

<body>

<header>
  <div>GAME NESR3</div>
  <div class="wallet-btn" onclick="showPage('wallet')">💼 Wallet</div>
</header>

<div id="home" class="page active">
  <h1>Start</h1>
  <button onclick="showPage('game')">Play</button>
</div>

<div id="game" class="page">
  <h3>Score: <span id="score">0</span> | Coins: <span id="coins">0</span></h3>
  <div id="gameArea">
    <div id="car"></div>
  </div>
  <button onclick="showPage('home')">Back</button>
</div>

<div id="wallet" class="page">
  <h2>Wallet</h2>
  <div class="coin-box main">NES3: <span id="nes3">0</span></div>
  <div class="coin-box">DAF1</div>
  <div class="coin-box">DAF7</div>
  <div class="coin-box">DAYF</div>
  <div class="coin-box">NOR4</div>
  <div class="coin-box">SMR99</div>
  <div class="coin-box">MAHA</div>
  <button onclick="showPage('home')">Back</button>
</div>

<script>
function showPage(id){
  document.querySelectorAll('.page').forEach(p=>p.classList.remove('active'));
  document.getElementById(id).classList.add('active');
}

let carX=170, score=0, coins=0;
let enemies=[], coinList=[];

document.addEventListener("keydown",(e)=>{
  let car=document.getElementById("car");
  if(e.key==="ArrowLeft") carX-=30;
  if(e.key==="ArrowRight") carX+=30;
  car.style.left=carX+"px";
});

function spawnEnemy(){
  let e=document.createElement("div");
  e.className="enemy";
  e.style.left=Math.random()*340+"px";
  e.style.top="0px";
  document.getElementById("gameArea").appendChild(e);
  enemies.push(e);
}

function spawnCoin(){
  let c=document.createElement("div");
  c.className="coin";
  c.style.left=Math.random()*340+"px";
  c.style.top="0px";
  document.getElementById("gameArea").appendChild(c);
  coinList.push(c);
}

function update(){
  enemies.forEach((e,i)=>{
    let top=parseInt(e.style.top)||0;
    e.style.top=top+5+"px";

    if(top>500 && Math.abs(e.offsetLeft-carX)<60){
      alert("Game Over");
      location.reload();
    }

    if(top>600){
      e.remove();
      enemies.splice(i,1);
      score++;
    }
  });

  coinList.forEach((c,i)=>{
    let top=parseInt(c.style.top)||0;
    c.style.top=top+5+"px";

    if(top>500 && Math.abs(c.offsetLeft-carX)<60){
      coins++;
      c.remove();
      coinList.splice(i,1);
    }

    if(top>600){
      c.remove();
      coinList.splice(i,1);
    }
  });

  document.getElementById("score").innerText=score;
  document.getElementById("coins").innerText=coins;
  document.getElementById("nes3").innerText=Math.floor(coins/50);
}

setInterval(update,30);
setInterval(spawnEnemy,1000);
setInterval(spawnCoin,1500);
</script>

</body>
</html>
