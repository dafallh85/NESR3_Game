<!DOCTYPE html>
<html lang="ar">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>لعبة نسر 3 - سيارات</title>

<style>
  body { margin:0; padding:0; font-family: Arial; background:#111; color:#fff; overflow:hidden;}
  #gameContainer { width:100vw; height:80vh; background:#222; display:flex; justify-content:center; align-items:center;}
  #ui { width:100%; height:20vh; display:flex; justify-content:space-around; align-items:center; background:#111;}
  button { padding:10px 20px; font-size:16px; cursor:pointer; border:none; border-radius:5px; background:#ff9500; color:#fff;}
  #status { font-size:14px; }
</style>

</head>
<body>

<div id="gameContainer">
  <canvas id="gameCanvas" width="800" height="600"></canvas>
</div>

<div id="ui">
  <button onclick="connectWallet()">ربط المحفظة</button>
  <button onclick="depositTokens()">إيداع</button>
  <button onclick="buyTokens()">شراء</button>
  <button onclick="withdrawFromGame()">سحب</button>
  <div id="status">الحالة: غير متصل</div>
</div>

<!-- Web3 -->
<script src="https://cdn.jsdelivr.net/npm/web3@1.10.0/dist/web3.min.js"></script>
<script src="web3.js"></script>

<script>
// ===== محفظة اللعبة =====
let gameWallet = { NES3: 0, DAF1: 0 };

// ===== اللعبة =====
const canvas = document.getElementById('gameCanvas');
const ctx = canvas.getContext('2d');

let car = { x: 370, y: 500, width: 60, height: 100 };
let speed = 5;
let obstacles = [];
let score = 0;

function createObstacle() {
    const width = Math.random() * 100 + 50;
    const x = Math.random() * (canvas.width - width);
    obstacles.push({ x, y: -100, width, height: 20 });
}

function draw() {
    ctx.clearRect(0,0,canvas.width,canvas.height);

    // السيارة
    ctx.fillStyle = "#0f0";
    ctx.fillRect(car.x, car.y, car.width, car.height);

    // العقبات
    obstacles.forEach(ob => {
        ctx.fillStyle = "#f00";
        ctx.fillRect(ob.x, ob.y, ob.width, ob.height);

        ob.y += speed;

        // كسب عملات
        if (ob.y > canvas.height) {
            gameWallet.NES3 += 1;
            gameWallet.DAF1 += 1;
            ob.y = -100;
            ob.x = Math.random() * (canvas.width - ob.width);
        }

        // تصادم
        if (
            car.x < ob.x + ob.width &&
            car.x + car.width > ob.x &&
            car.y < ob.y + ob.height &&
            car.y + car.height > ob.y
        ) {
            alert("اصطدمت! العملات محفوظة داخل اللعبة 💰");
            car.x = 370;
        }
    });

    // عرض الرصيد داخل اللعبة
    ctx.fillStyle = "#fff";
    ctx.fillText("NES3: " + gameWallet.NES3, 10, 20);
    ctx.fillText("DAF1: " + gameWallet.DAF1, 10, 40);

    requestAnimationFrame(draw);
}

// التحكم
document.addEventListener('keydown', (e) => {
    if (e.key === "ArrowLeft") car.x -= 20;
    if (e.key === "ArrowRight") car.x += 20;
});

// تشغيل
setInterval(createObstacle, 2000);
draw();

</script>

</body>
</html>
