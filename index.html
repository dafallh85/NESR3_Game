}
<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>NESR3 Game Platform</title>

<style>
body {
  margin:0;
  font-family: Arial;
  background: linear-gradient(rgba(0,0,0,0.7), rgba(0,0,0,0.7)),
              url("images/bg.jpg") no-repeat center center fixed;
  background-size: cover;
  color:white;
  text-align:center;
}

.hidden { display:none; }

button {
  padding:10px 18px;
  margin:6px;
  border:none;
  border-radius:8px;
  cursor:pointer;
  background:#22c55e;
  color:white;
}

input {
  padding:8px;
  margin:5px;
  border-radius:6px;
  border:none;
}

.top-bar {
  position:absolute;
  top:10px;
  right:10px;
}

#games button {
  display:block;
  width:220px;
  margin:8px auto;
}
</style>
</head>

<body>

<!-- Welcome -->
<div id="welcome">
<h1>👋 Welcome to NESR3 Game</h1>
<button onclick="showLogin()">Start</button>
</div>

<!-- Login -->
<div id="login" class="hidden">
<h2>Login</h2>
<input type="email" id="email" placeholder="Email"><br>
<input type="password" id="pass" placeholder="Password"><br>
<button onclick="login()">Login</button>
</div>

<!-- Dashboard -->
<div id="dashboard" class="hidden">

<div class="top-bar">
<button onclick="openWallet()">💼 Wallet</button>
</div>

<h2>Choose Your Game</h2>

<div id="games">
<button onclick="startGame('NESR3')">NESR3 Game</button>
<button onclick="startGame('Car')">Car Game</button>
<button onclick="startGame('Sea')">Sea Game</button>
<button onclick="startGame('Forest')">Forest Game</button>
<button onclick="startGame('City')">City Game</button>
<button onclick="startGame('Village')">Village Game</button>
</div>

<h3>💰 Balance</h3>
<p>NES3: <span id="nes3">0</span> | DAF1: <span id="daf1">0</span></p>

<button onclick="openWallet()">Open Wallet</button>

</div>

<!-- Game -->
<div id="game" class="hidden">
<h2 id="gameTitle"></h2>

<button onclick="earn()">Earn</button>
<button onclick="crash()">Crash</button>

<br><br>
<button onclick="back()">⬅ Back</button>
</div>

<!-- Wallet -->
<div id="wallet" class="hidden">

<h2>💼 Wallet</h2>

<h3>Balances</h3>
<p>NES3: <span id="w_nes3">0</span></p>
<p>DAF1: <span id="w_daf1">0</span></p>

<h3>Recharge (Demo)</h3>

<select id="coin">
<option>USDT</option>
<option>SOL</option>
<option>BNB</option>
<option>USDG</option>
<option>USDC</option>
<option>BTC</option>
<option>DAF1</option>
<option>NES3</option>
<option>DAYF</option>
<option>MAHA</option>
<option>NOR4</option>
<option>DAF7</option>
<option>SMR99</option>
</select>

<input type="number" id="amount" placeholder="Amount">

<br>

<button onclick="recharge()">Recharge Crypto</button>
<button onclick="applePay()">Apple Store</button>
<button onclick="bankPay()">Bank Card</button>

<h3>Withdraw (Demo)</h3>
<button onclick="withdraw()">Withdraw to Wallet</button>

<br><br>
<button onclick="back()">⬅ Back</button>

</div>

<script>

let nes3 = 0;
let daf1 = 0;

// Navigation
function showLogin(){
hideAll();
document.getElementById('login').classList.remove('hidden');
}

function login(){
let email = document.getElementById('email').value;
let pass = document.getElementById('pass').value;

if(email && pass){
hideAll();
document.getElementById('dashboard').classList.remove('hidden');
update();
}else{
alert("Enter email & password");
}
}

function back(){
hideAll();
document.getElementById('dashboard').classList.remove('hidden');
update();
}

function hideAll(){
document.querySelectorAll('body > div').forEach(div => div.classList.add('hidden'));
}

// Game
function startGame(name){
hideAll();
document.getElementById('game').classList.remove('hidden');
document.getElementById('gameTitle').innerText = name + " Game";
}

function earn(){
nes3 += 10;
daf1 += 5;
update();
}

function crash(){
nes3 -= 5;
daf1 -= 3;
update();
}

// Wallet
function openWallet(){
hideAll();
document.getElementById('wallet').classList.remove('hidden');
update();
}

function recharge(){
let amount = parseInt(document.getElementById('amount').value);

if(amount > 0){
nes3 += amount;
alert("Recharge successful (Demo)");
update();
}
}

function withdraw(){
alert("Withdraw request sent (Demo)");
}

function applePay(){
alert("Apple Pay (Coming Soon)");
}

function bankPay(){
alert("Bank Payment (Coming Soon)");
}

// Update UI
function update(){
document.getElementById('nes3').innerText = nes3;
document.getElementById('daf1').innerText = daf1;
document.getElementById('w_nes3').innerText = nes3;
document.getElementById('w_daf1').innerText = daf1;
}

</script>

</body>
</html
