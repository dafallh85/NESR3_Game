<!DOCTYPE html>
<html lang="ar">
<head>
<meta charset="UTF-8">
<title>NESR3 Game – ابدأ المغامرة</title>
<link rel="stylesheet" href="assets/styles.css">
<script src="libs/three.min.js"></script>
<script src="libs/GLTFLoader.js"></script>
<script src="libs/OrbitControls.js"></script>
<script src="game.js"></script>
<style>
  body { font-family: Arial, sans-serif; background: #111; color: #fff; text-align:center; }
  button { padding: 10px 20px; margin: 10px; font-size:16px; cursor:pointer; }
  #shopScreen { display:none; }
</style>
</head>
<body>

<div id="startScreen">
  <h1>🦅 NESR3 Game</h1>
  <p>اختر عالمك وابدأ المغامرة!</p>
  <button onclick="startWorld('cars')">🚗 سيارات</button>
  <button onclick="startWorld('eagle')">🦅 النسر</button>
  <button onclick="startWorld('sea')">🌊 البحار</button>
  <button onclick="startWorld('forest')">🌳 الغابات</button>
  <button onclick="startWorld('city')">🏙 المدن</button>
</div>

<div id="shopScreen">
  <h2>💰 شحن حسابك</h2>
  <button onclick="charge('NES3')">NES3</button>
  <button onclick="charge('DAF1')">DAF1</button>
  <button onclick="charge('USDT')">USDT</button>
  <button onclick="charge('USDG')">USDG</button>
  <button id="applePayBtn">💳 Apple Pay</button>
  <button id="cardPayBtn">💳 بطاقة بنكية</button>
</div>

<script>
function startWorld(world){
  alert("تم اختيار العالم: " + world + "\nابدأ المغامرة!");
  document.getElementById('startScreen').style.display='none';
  document.getElementById('shopScreen').style.display='block';
}

function charge(currency){
  let link = "";
  if(currency === "NES3") link = "https://bscscan.com/address/0x6E2dad6405bF68Ffcda0dCD551f10EB029E29313";
  if(currency === "DAF1") link = "https://bscscan.com/address/0x0C9a6b4Bd24d69812b8f3a71a56DA686C9110012";
  if(currency === "USDT") link = "https://bscscan.com/address/USDT_CONTRACT";
  if(currency === "USDG") link = "https://bscscan.com/address/USDG_CONTRACT";
  window.open(link,"_blank");
}

document.getElementById('applePayBtn').addEventListener('click',function(){
  alert("Apple Pay جاهز لاحقاً للربط مع بوابة الدفع.");
});
document.getElementById('cardPayBtn').addEventListener('click',function(){
  alert("الشحن بالبطاقة البنكية جاهز لاحقاً للربط مع بوابة الدفع.");
});
</script>

</body>
</html>
