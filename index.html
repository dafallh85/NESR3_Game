<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>NESR3 Game Platform</title>

<style>
body {
  margin:0;
  font-family: Arial;
  background:#0f172a;
  color:white;
  text-align:center;
}

.hidden { display:none; }

button {
  padding:12px 20px;
  margin:10px;
  border:none;
  border-radius:8px;
  cursor:pointer;
  background:#22c55e;
  color:white;
  font-size:16px;
}

input {
  padding:10px;
  margin:10px;
  border-radius:6px;
  border:none;
  width:250px;
}

.top-bar {
  position:absolute;
  top:10px;
  right:10px;
}

#games button {
  display:block;
  width:220px;
  margin:10px auto;
}

canvas {
  background:black;
  margin-top:20px;
}
</style>
</head>

<body>

<div id="welcome">
  <h1>👋 Welcome to NESR3 Game</h1>
  <p>Start your journey and earn NES3 & DAF1</p>
  <button onclick="showLogin()">Start</button>
</div>

<div id="login" class="hidden">
  <h2>Login</h2>
  <input type="email" id="email" placeholder="Enter Email"><br>
  <input type="password" id="pass" placeholder="Enter Password"><br>
  <button onclick="login()">Login</button>
</div>

<div id="dashboard" class="hidden">

  <div class="top-bar">
    <button onclick="connectWallet()">Connect Wallet</button>
  </div>

  <h2>Choose Your Game</h2>

  <div id="games">
    <button onclick="startGame('nesr')">NESR3 Game</button>
    <button onclick="startCarGame()">🚗 Car Game</button>
    <button onclick="startGame('sea')">🌊 Sea Game</button>
    <button onclick="startGame('forest')">🌲 Forest Game</button>
    <button onclick="startGame('city')">🏙 City Game</button>
    <button onclick="startGame('village')">🏡 Village Game</button>
  </div>

  <h3>💰 Balance</h3>
  <p>NES3: <span id="nes3">100</span> | DAF1: <span id="daf1">100</span></p>

</div>

<div id="game" class="hidden">
  <h2 id="gameTitle"></h2>
  <p>Play and earn coins!</p>

  <button onclick="earn()">Earn Coins</button>
  <button onclick="crash()">Crash 😅</button>
  <br><br>
  <button onclick="back()">⬅ Back</button>
</div>

<div id="carGame" class="hidden">
  <h2>🚗 Car Game</h2>
  <p>Move with arrows ⬅➡ | Avoid obstacles</p>

  <canvas id="canvas" width="300" height="400"></canvas>

  <br>
  <button onclick="back()">⬅ Back</button>
</div>

<script>

let nes3 = 100;
let daf1 = 100;

function showLogin(){
  hideAll();
  document.getElementById('login').classList.remove('hidden');
}

function login(){
  let email = document.getElementById('email').value;
  let pass = document.getElementById('pass').value;

  if(email && pass){
    hideAll();
    document.getElementById('dashboard').classList.remove('hidden');
  } else {
    alert("Enter email & password");
  }
}

function connectWallet(){
  alert("Wallet Connected (Demo)");
}

function startGame(name){
  hideAll();
  document.getElementById('game').classList.remove('hidden');
  document.getElementById('gameTitle').innerText = name.toUpperCase() + " GAME";
}

function back(){
  hideAll();
  document.getElementById('dashboard').classList.remove('hidden');
}

function hideAll(){
  document.querySelectorAll('body > div').forEach(div => div.classList.add('hidden'));
}

function earn(){
  nes3 += 10;
  daf1 += 5;
  update();
}

function crash(){
  nes3 -= 5;
  daf1 -= 3;
  update();
}

function update(){
  document.getElementById('nes3').innerText = nes3;
  document.getElementById('daf1').innerText = daf1;
}

let canvas = document.getElementById("canvas");
let ctx = canvas.getContext("2d");

let car = { x:130, y:300, w:40, h:60 };
let obstacle = { x: Math.random()*260, y:0, w:40, h:60 };

document.addEventListener("keydown", e => {
  if(e.key === "ArrowLeft") car.x -= 20;
  if(e.key === "ArrowRight") car.x += 20;
});

function startCarGame(){
  hideAll();
  document.getElementById('carGame').classList.remove('hidden');
  gameLoop();
}

function gameLoop(){
  ctx.clearRect(0,0,300,400);

  ctx.fillStyle = "lime";
  ctx.fillRect(car.x, car.y, car.w, car.h);

  ctx.fillStyle = "red";
  ctx.fillRect(obstacle.x, obstacle.y, obstacle.w, obstacle.h);

  obstacle.y += 5;

  if(car.x < obstacle.x + obstacle.w &&
     car.x + car.w > obstacle.x &&
     car.y < obstacle.y + obstacle.h &&
     car.y + car.h > obstacle.y){

      crash();
      obstacle.y = 0;
      obstacle.x = Math.random()*260;
  }

  if(obstacle.y > 400){
    obstacle.y = 0;
    obstacle.x = Math.random()*260;
    earn();
  }

  requestAnimationFrame(gameLoop);
}

</script>

</body>
</html>
