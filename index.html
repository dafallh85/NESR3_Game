<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>GAME NESR3</title>

<style>
body {
  margin:0;
  font-family: Arial;
  background: linear-gradient(rgba(0,0,0,0.7), rgba(0,0,0,0.7)),
              url("images/bg.jpg") no-repeat center center fixed;
  background-size: cover;
  color:white;
  text-align:center;
}

.hidden { display:none; }

.center-box {
  position: absolute;
  top:50%;
  left:50%;
  transform: translate(-50%,-50%);
  background: rgba(0,0,0,0.7);
  padding:30px;
  border-radius:12px;
  width:300px;
}

h1 { font-size:40px; margin-bottom:10px; }
h2 { margin-top:5px; }

button {
  padding:10px 18px;
  margin:6px;
  border:none;
  border-radius:8px;
  cursor:pointer;
  background:#22c55e;
  color:white;
}

input {
  padding:10px;
  margin:8px;
  border-radius:6px;
  border:none;
  width:90%;
}

#games button {
  display:block;
  width:220px;
  margin:8px auto;
}
</style>
</head>

<body>

<!-- Login -->
<div id="login" class="center-box">
<h1>GAME NESR3</h1>
<h3>Welcome to Digital Future Games</h3>

<h2>Login</h2>
<input type="email" id="email" placeholder="Email">
<input type="password" id="pass" placeholder="Password">
<button onclick="login()">Login</button>
</div>

<!-- Dashboard -->
<div id="dashboard" class="hidden">

<h1>GAME NESR3</h1>
<h3>Welcome to Digital Future Games</h3>

<h2>Choose Your Favorite Game</h2>

<div id="games">
<button onclick="startGame('NESR3')">NESR3 Game</button>
<button onclick="startGame('Car')">Car Game</button>
<button onclick="startGame('Sea')">Sea Game</button>
<button onclick="startGame('Forest')">Forest Game</button>
<button onclick="startGame('City')">City Game</button>
<button onclick="startGame('Village')">Village Game</button>
</div>

<br>
<button onclick="openWallet()">🎮 Game Wallet</button>

</div>

<!-- Game -->
<div id="game" class="hidden">
<h2 id="gameTitle"></h2>

<button onclick="earn()">Earn</button>
<button onclick="crash()">Crash</button>

<br><br>
<button onclick="back()">⬅ Back</button>
</div>

<!-- Wallet -->
<div id="wallet" class="hidden">

<h1>🎮 Game Wallet</h1>

<h3>Balances</h3>

<div id="balances"></div>

<h3>Actions</h3>

<button onclick="deposit()">Deposit</button>
<button onclick="withdraw()">Withdraw</button>
<button onclick="transfer()">Transfer</button>

<br><br>
<button onclick="back()">⬅ Back</button>

</div>

<script>

// العملات
let coins = {
USDT:0, SOL:0, BNB:0, USDG:0, USDC:0,
BTC:0, DAF1:0, NES3:0, DAYF:0, MAHA:0,
NOR4:0, DAF7:0, SMR99:0
};

// تسجيل الدخول
function login(){
let email = document.getElementById('email').value;
let pass = document.getElementById('pass').value;

if(email && pass){
hideAll();
document.getElementById('dashboard').classList.remove('hidden');
}else{
alert("Enter email & password");
}
}

// التنقل
function hideAll(){
document.querySelectorAll('body > div').forEach(div => div.classList.add('hidden'));
}

function back(){
hideAll();
document.getElementById('dashboard').classList.remove('hidden');
}

// الألعاب
function startGame(name){
hideAll();
document.getElementById('game').classList.remove('hidden');
document.getElementById('gameTitle').innerText = name + " Game";
}

// ربح وخسارة
function earn(){
coins.NES3 += 10;
coins.DAF1 += 5;
updateWallet();
}

function crash(){
coins.NES3 -= 5;
coins.DAF1 -= 3;
updateWallet();
}

// المحفظة
function openWallet(){
hideAll();
document.getElementById('wallet').classList.remove('hidden');
updateWallet();
}

function updateWallet(){
let html = "";
for(let coin in coins){
html += "<p>"+coin+" : "+coins[coin]+"</p>";
}
document.getElementById('balances').innerHTML = html;
}

// العمليات (Demo)
function deposit(){
alert("Deposit (Coming Soon)");
}

function withdraw(){
alert("Withdraw (Coming Soon)");
}

function transfer(){
alert("Transfer (Coming Soon)");
}

</script>

</body>
</html>
